name: CI
on: [push, pull_request]

env:
  CI_LEVEL: production

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: production
    steps:
      - uses: actions/checkout@v4
      - name: Test
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_TEST }}
          API_KEY: ${{ secrets.CI_API_KEY }}
        run: npm test
