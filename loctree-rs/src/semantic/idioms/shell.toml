# Loctree shell idiom catalog (default).
# Override via <workspace>/.loctree/idioms/shell.toml.
# Source of truth: docs/semantic-spec.md "Shell idiom catalog" (Cut 3A).
# 25 entries — keep in sync with the spec doc.

# ---- CLI / entrypoint idioms ------------------------------------------------

[[idiom]]
name = "usage"
classifier = "HelpPrinter"
runtime_role = "UserFacing"
language = "shell"
reasoning = "CLI help-text printer; reachable via --help or no-args invocation."

[[idiom]]
name = "die"
classifier = "ErrorExit"
runtime_role = "LibraryHelper"
language = "shell"
aliases = ["abort", "fail"]
reasoning = "Bail-out helper; prints message then exits non-zero."

[[idiom]]
name = "main"
classifier = "PrimaryEntrypoint"
runtime_role = "PrimaryEntrypoint"
language = "shell"
reasoning = "Script entrypoint sourced as last line; reached by shebang execution."

