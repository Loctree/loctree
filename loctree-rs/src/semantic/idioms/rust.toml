# ---- Lifecycle / entrypoint idioms -----------------------------------------

[[idiom]]
name = "main"
classifier = "PrimaryEntrypoint"
runtime_role = "PrimaryEntrypoint"
language = "rust"
reasoning = "Binary crate entrypoint; reachable via cargo run / compiled binary execution, not via static call."

[[idiom]]
name = "new"
classifier = "LibraryHelper"
runtime_role = "LibraryHelper"
language = "rust"
reasoning = "Idiomatic Rust constructor convention; called via Type::new(...) across the ecosystem."

