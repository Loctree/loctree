# Loctree Tauri idiom catalog (default).
# Override via <workspace>/.loctree/idioms/tauri.toml.
# Source of truth: Cut 3B T3 Layer 3 Tauri runtime semantics.

[[idiom]]
name = "#[tauri::command]"
classifier = "DispatchHandler"
runtime_role = "PublicEntrypoint"
language = "rust"
aliases = ["#[command]", "tauri_command"]
reasoning = "Rust function exposed to the Tauri invoke runtime."

[[idiom]]
name = "generate_handler!"
classifier = "DispatchHandler"
runtime_role = "PublicEntrypoint"
language = "rust"
aliases = ["tauri::generate_handler!"]
reasoning = "Tauri macro registering backend command handlers into the runtime dispatch table."

[[idiom]]
name = "invoke_handler"
classifier = "DispatchHandler"
runtime_role = "PublicEntrypoint"
language = "rust"
reasoning = "Builder method wiring Tauri command handlers into the app runtime."

[[idiom]]
name = "invoke"
classifier = "DispatchHandler"
runtime_role = "UserFacing"
language = "typescript"
aliases = ["safeInvoke", "invokeCommand"]
reasoning = "Frontend call into a backend Tauri command."

[[idiom]]
name = "invoke"
classifier = "DispatchHandler"
runtime_role = "UserFacing"
language = "javascript"
aliases = ["safeInvoke", "invokeCommand"]
reasoning = "Frontend JavaScript call into a backend Tauri command."

