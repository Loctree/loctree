name: Bug Report
description: Report a bug in Loctree CLI or MCP server
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
  - type: input
    id: version
    attributes:
      label: Loctree version
      description: "Exact output of `loct --version` or `loctree --version`"
      placeholder: "loct 0.x.y"
  - type: dropdown
    id: install
    attributes:
      label: Install method
      options:
        - loct.io install script
        - cargo install
        - npm install
        - Homebrew
        - GitHub release asset
        - Built from source
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "macOS 15.3 / Ubuntu 24.04 / Windows 11"
