  publish-thin-releases:
    name: Publish Thin Repo Releases
    needs:
      - verify-release
      - build-cli-linux
      - build-cli-macos-arm64
      - build-cli-macos-x86_64
      - build-cli-windows
      - build-mcp-linux
      - build-mcp-macos-arm64
      - build-mcp-macos-x86_64
      - build-mcp-windows
    runs-on: [self-hosted, Linux, X64, ops]
    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Show packaged assets
        run: ls -lah release-assets

      - name: Publish CLI thin release
        uses: actions/github-script@v7
        env:
          TARGET_REPO: ${{ env.CLI_RELEASE_REPO }}
          TARGET_TAG: v${{ needs.verify-release.outputs.version }}
          TARGET_VERSION: ${{ needs.verify-release.outputs.version }}
          RELEASE_NAME: loct v${{ needs.verify-release.outputs.version }}
          ASSET_PREFIX: loct-
          ASSET_DIR: release-assets
          RELEASE_BODY: |
            Thin release channel for the Loctree CLI.

            Source of truth: `Loctree/loctree-ast`
            Install:
            - `brew install loctree/cli/loct`
            - `cargo install --locked loctree`
            - `npm install -g loctree` (macOS arm64/x64, Linux x64 glibc, Windows x64)
        with:
          github-token: ${{ secrets.HOMEBREW_GITHUB_API_TOKEN }}
          script: |
            const fs = require("fs");
            const path = require("path");

            const [owner, repo] = process.env.TARGET_REPO.split("/");
            const tag = process.env.TARGET_TAG;
            const releaseName = process.env.RELEASE_NAME;
            const releaseBody = process.env.RELEASE_BODY;
            const assetDir = process.env.ASSET_DIR;
            const assetPrefix = process.env.ASSET_PREFIX;
            const files = fs.readdirSync(assetDir).filter((name) => name.startsWith(assetPrefix)).sort();

            if (!files.length) {
              core.setFailed(`No assets found in ${assetDir} with prefix ${assetPrefix}`);
              return;
            }

            let release;
            try {
              release = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: release.data.id,
                tag_name: tag,
                name: releaseName,
                body: releaseBody,
                draft: false,
                prerelease: false,
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
              release = await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                name: releaseName,
                body: releaseBody,
                draft: false,
                prerelease: false,
              });
            }

            const releaseId = release.data.id;
            const existingAssets = await github.paginate(github.rest.repos.listReleaseAssets, {
              owner,
              repo,
              release_id: releaseId,
              per_page: 100,
            });

            for (const fileName of files) {
              const existing = existingAssets.find((asset) => asset.name === fileName);
              if (existing) {
                await github.rest.repos.deleteReleaseAsset({
                  owner,
                  repo,
                  asset_id: existing.id,
                });
              }

              const data = fs.readFileSync(path.join(assetDir, fileName));
              await github.rest.repos.uploadReleaseAsset({
                owner,
                repo,
                release_id: releaseId,
                name: fileName,
                data,
                headers: {
                  "content-type": "application/octet-stream",
                  "content-length": data.length,
                },
              });
            }

      - name: Publish MCP thin release
        uses: actions/github-script@v7
        env:
          TARGET_REPO: ${{ env.MCP_RELEASE_REPO }}
          TARGET_TAG: v${{ needs.verify-release.outputs.version }}
          TARGET_VERSION: ${{ needs.verify-release.outputs.version }}
          RELEASE_NAME: loctree-mcp v${{ needs.verify-release.outputs.version }}
          ASSET_PREFIX: loctree-mcp-
          ASSET_DIR: release-assets
          RELEASE_BODY: |
            Thin release channel for the Loctree MCP server.

            Source of truth: `Loctree/loctree-ast`
            Install:
            - `brew install loctree/mcp/loctree-mcp`
            - `cargo install --locked loctree-mcp`
        with:
          github-token: ${{ secrets.HOMEBREW_GITHUB_API_TOKEN }}
          script: |
            const fs = require("fs");
            const path = require("path");

            const [owner, repo] = process.env.TARGET_REPO.split("/");
            const tag = process.env.TARGET_TAG;
            const releaseName = process.env.RELEASE_NAME;
            const releaseBody = process.env.RELEASE_BODY;
            const assetDir = process.env.ASSET_DIR;
            const assetPrefix = process.env.ASSET_PREFIX;
            const files = fs.readdirSync(assetDir).filter((name) => name.startsWith(assetPrefix)).sort();

            if (!files.length) {
              core.setFailed(`No assets found in ${assetDir} with prefix ${assetPrefix}`);
              return;
            }

            let release;
            try {
              release = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: release.data.id,
                tag_name: tag,
                name: releaseName,
                body: releaseBody,
                draft: false,
                prerelease: false,
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
              release = await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                name: releaseName,
                body: releaseBody,
                draft: false,
                prerelease: false,
              });
            }

            const releaseId = release.data.id;
            const existingAssets = await github.paginate(github.rest.repos.listReleaseAssets, {
              owner,
              repo,
              release_id: releaseId,
              per_page: 100,
            });

            for (const fileName of files) {
              const existing = existingAssets.find((asset) => asset.name === fileName);
              if (existing) {
                await github.rest.repos.deleteReleaseAsset({
                  owner,
                  repo,
                  asset_id: existing.id,
                });
              }

              const data = fs.readFileSync(path.join(assetDir, fileName));
              await github.rest.repos.uploadReleaseAsset({
                owner,
                repo,
                release_id: releaseId,
                name: fileName,
                data,
                headers: {
                  "content-type": "application/octet-stream",
                  "content-length": data.length,
                },
              });
            }

  publish-npm:
    name: Publish npm Packages
    needs:
      - verify-release
      - publish-thin-releases
    runs-on: [self-hosted, Linux, X64, ops]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Refresh npm package versions
        run: |
          node distribution/npm/sync-version.mjs "${{ needs.verify-release.outputs.version }}"
          cd distribution/npm
          ./CREATE_PLATFORM_PACKAGES.sh "${{ needs.verify-release.outputs.version }}"

      - name: Publish npm platform packages
        working-directory: distribution/npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for dir in platform-packages/*/; do
            (cd "$dir" && npm publish --access public)
          done
          sleep 20

      - name: Publish main npm package
        working-directory: distribution/npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

  publish-monorepo-release:
    name: Publish Monorepo Release
    needs:
      - verify-release
      - publish-crates
      - publish-thin-releases
      - publish-npm
    runs-on: [self-hosted, Linux, X64, ops]
    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create monorepo release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.verify-release.outputs.tag }}
          name: loctree ${{ needs.verify-release.outputs.version }}
          draft: false
          prerelease: false
          files: |
            release-assets/*.tar.gz
            release-assets/*.zip
          body: |
            ## loctree v${{ needs.verify-release.outputs.version }}

            Monorepo release for source, changelog, and installable binary assets.

            User-facing binary channels:
            - CLI assets: https://github.com/${{ env.CLI_RELEASE_REPO }}/releases/tag/v${{ needs.verify-release.outputs.version }}
            - MCP assets: https://github.com/${{ env.MCP_RELEASE_REPO }}/releases/tag/v${{ needs.verify-release.outputs.version }}

            Installation:

            ```bash
            cargo install --locked loctree loctree-mcp
            npm install -g loctree  # CLI only; macOS arm64/x64, Linux x64 glibc, Windows x64
            brew install loctree/cli/loct
            brew install loctree/mcp/loctree-mcp
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
