name: ci

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  linux:
    name: Linux
    runs-on: [self-hosted, Linux, X64, ops]
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        run: |
          if ! command -v protoc >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y protobuf-compiler
          fi

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust fmt
        run: cargo fmt --all -- --check
      - name: Rust clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Rust tests
        run: cargo test --workspace

  macos:
    name: macOS
    runs-on: [self-hosted, macOS, ARM64, dragon]
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        run: |
          if ! command -v protoc >/dev/null 2>&1; then
            brew install protobuf
          fi

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust fmt
        run: cargo fmt --all -- --check
      - name: Rust clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Rust tests
        run: cargo test --workspace
